name = "truehhart-com"
compatibility_date = "2024-09-23"
workers_dev = false
preview_urls = true

# Prerender content/*.toml -> dist/ before every dev/deploy (incl. CI).
# watch_dir defaults to src/ only; add content/ and public/ so `wrangler dev`
# rebuilds on TOML, CSS, and image edits too.
[build]
command = "node build.mjs"
watch_dir = ["src", "content", "public"]

# Static-assets-only deployment: dist/ is produced by the build step above.
[assets]
directory = "dist"

[[routes]]
pattern = "truehhart.com"
custom_domain = true
